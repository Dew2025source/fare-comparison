<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideSync — Compare Fares. Ride Smart.</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
    <div id="appToast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg">Booking confirmed!</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>


  <div class="modal fade" id="logoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content booking-modal-content">
        <div class="modal-body text-center p-4">
          <div class="mb-3" style="font-size:2.5rem;">👋</div>
          <h5 class="fw-700 mb-2">Leaving so soon?</h5>
          <p style="color:var(--brand-muted);font-size:0.88rem;margin-bottom:1.5rem;">Are you sure you want to logout?
          </p>
          <div class="d-flex gap-2">
            <button class="btn-outline-brand flex-fill py-2" data-bs-dismiss="modal">Cancel</button>
            <button class="btn-grad flex-fill py-2" onclick="confirmLogout()">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>


  <nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
    <div class="container">
      <a class="navbar-brand fw-800" href="#" onclick="navigate('home')">
        <span class="logo-icon">
          <i class="bi bi-signpost-split-fill"></i>
        </span>
        Ride<span class="brand-accent">Sync</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1" id="navLinks">
          <li class="nav-item">
            <a class="nav-link nav-btn" href="#" onclick="navigate('home')" data-page="home">
              <i class="bi bi-house-door-fill me-1"></i>Home
            </a>
          </li>
          <li class="nav-item" id="navCompare" style="display:none">
            <a class="nav-link nav-btn" href="#" onclick="navigate('compare')" data-page="compare">
              <i class="bi bi-bar-chart-line-fill me-1"></i>Compare
            </a>
          </li>
          <li class="nav-item" id="navRides" style="display:none">
            <a class="nav-link nav-btn" href="#" onclick="navigate('myrides')" data-page="myrides">
              <i class="bi bi-clock-history me-1"></i>My Rides
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-btn" href="#" onclick="navigate('contact')" data-page="contact">
              <i class="bi bi-chat-dots-fill me-1"></i>Contact
            </a>
          </li>
          <li class="nav-item" id="navLogout" style="display:none">
            <a class="nav-link nav-btn logout-btn" href="#" onclick="logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
          </li>
          <li class="nav-item" id="navLogin" style="display:none">
            <a class="nav-link nav-btn login-nav-btn" href="#" onclick="navigate('login')">
              <i class="bi bi-person-fill me-1"></i>Login
            </a>
          </li>
        </ul>
        <button class="dark-toggle ms-lg-3 mt-2 mt-lg-0" onclick="toggleDarkMode()" title="Toggle dark mode">
          <i class="bi bi-moon-stars-fill" id="darkIcon"></i>
        </button>
      </div>
    </div>
  </nav>


  <main id="app"></main>

  <div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content booking-modal-content">
        <div class="modal-body text-center p-5">
          <div class="confirm-icon mb-4">
            <div class="confirm-ring">
              <i class="bi bi-check-lg"></i>
            </div>
          </div>
          <h3 class="fw-700 mb-2">Booking Confirmed!</h3>
          <p class="text-muted mb-4" id="modalSubtext">Your ride has been booked successfully.</p>
          <div class="booking-detail-card mb-4" id="modalDetails"></div>
          <div class="d-flex gap-2">
            <button class="btn btn-grad flex-fill py-3" data-bs-dismiss="modal">
              <i class="bi bi-check2 me-2"></i>Done
            </button>
            <a id="openInAppBtn" href="#" target="_blank" class="btn btn-open-app flex-fill py-3"
              data-bs-dismiss="modal">
              <i class="bi bi-box-arrow-up-right me-2"></i>Open App
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- App Script -->
  <script src="script.js"></script>
</body>

</html>
